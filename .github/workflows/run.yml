name: V3.0 Signal & Trade Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes automatically

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TRIGGER_SOURCE: "cronjob"
        run: node alert.js

      - name: Commit state and trades update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add state.json trades.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto update bot state and trade logs"
          git push origin HEAD:main
